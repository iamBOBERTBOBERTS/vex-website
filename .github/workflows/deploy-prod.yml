name: deploy-prod

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: vex
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres@localhost:5432/vex
      DIRECT_DATABASE_URL: postgresql://postgres@localhost:5432/vex
      SKIP_VALUATION_ENV_CHECK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate CI JWT secret
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - name: Turbo Remote Cache
        uses: turborepo/action@v2
        with:
          token: ${{ secrets.TURBO_TOKEN }}
          team: ${{ secrets.TURBO_TEAM }}
      - name: Prisma generate
        run: pnpm --filter @vex/api run db:generate
      - name: Migrate (API E2E prerequisite)
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy
      - name: Security scan
        run: pnpm audit --prod
      - name: Build
        run: pnpm -w turbo run build
      - name: Install Playwright browsers
        run: pnpm --filter @vex/web exec playwright install --with-deps chromium
      - name: Web e2e
        run: pnpm --filter @vex/web run test:e2e
      - name: Web accessibility
        run: pnpm --filter @vex/web run test:a11y
      - name: Lighthouse CI
        run: pnpm --filter @vex/web run test:lighthouse
      - name: API e2e
        run: pnpm --filter @vex/api run test:e2e
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Deploy hooks (blue-green trigger)
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then curl -fsSL -X POST "$VERCEL_DEPLOY_HOOK"; fi
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"; fi
