services:
  - type: web
    name: vex-api
    runtime: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @vex/shared run build && pnpm --filter @vex/api run build
    startCommand: pnpm --filter @vex/api run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: READ_REPLICA_URLS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PUBLIC_WEB_URL
        sync: false
      - key: PUBLIC_APPRAISAL_TENANT_ID
        sync: false
      - key: INTERNAL_PILOT_METRICS_KEY
        sync: false
      - key: EDMUNDS_API_KEY
        sync: false
      - key: EDMUNDS_SECRET
        sync: false
      - key: MARKETCHECK_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: STRIPE_PRICE_STARTER_YEARLY
        sync: false
      - key: STRIPE_PRICE_PRO_YEARLY
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE_YEARLY
        sync: false
      - key: FORTELLIS_CLIENT_ID
        sync: false
      - key: FORTELLIS_CLIENT_SECRET
        sync: false
      - key: FORTELLIS_SUBSCRIPTION_ID
        sync: false
      - key: FORTELLIS_TOKEN_URL
        sync: false
      - key: FORTELLIS_API_BASE_URL
        sync: false
      - key: FORTELLIS_WEBHOOK_SECRET
        sync: false
