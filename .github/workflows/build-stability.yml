name: Build stability (workspace root)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assert-root-and-build:
    name: Verify repo root + full build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if not monorepo root (package.json + workspace)
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            echo "::error::package.json missing — run all pnpm commands from the repo root, not from ~"
            exit 1
          fi
          if [ ! -f pnpm-workspace.yaml ]; then
            echo "::error::pnpm-workspace.yaml missing — wrong directory"
            exit 1
          fi
          node -e "const p=require('./package.json'); if(p.name!=='vex-website'){console.error('wrong package.json'); process.exit(1)}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Shared build
        run: pnpm --filter @vex/shared build

      - name: Cinematic GLSL package (TypeScript + shader modules)
        run: pnpm --filter @vex/cinematic build

      - name: Prisma generate (API)
        run: pnpm --filter @vex/api run db:generate

      - name: Turbo build (all packages)
        run: pnpm -w turbo run build

      - name: Web visual smoke (Playwright a11y + hero canvas + Apex + v4.2 GLSL hooks)
        run: |
          pnpm --filter @vex/web exec playwright install --with-deps chromium
          pnpm --filter @vex/web run test:smoke
