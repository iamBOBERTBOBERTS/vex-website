        sync: false
      - key: TEKION_CLIENT_ID
        sync: false
      - key: TEKION_CLIENT_SECRET
        sync: false
      - key: TEKION_SUBSCRIPTION_ID
        sync: false
      - key: TEKION_TOKEN_URL
        sync: false
      - key: TEKION_API_BASE_URL
