# Production-style stack: Postgres + Redis + API. Next.js apps (web/crm) are deployed separately
# with the same NEXT_PUBLIC_API_URL (see README → Production deployment).
#
# Required env for API container (use env_file or your secret manager):
#   JWT_SECRET              — strong random secret (never commit)
#   DATABASE_URL            — postgresql://vex:...@postgres:5432/vex
#   DIRECT_DATABASE_URL     — same as DATABASE_URL for migrate when not using a pooler
#   REDIS_URL               — redis://redis:6379
#   CORS_ORIGIN             — comma-separated origins, e.g. https://app.dealer.com,https://crm.dealer.com
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_* (see apps/api/.env.example)
#   EDMUNDS_API_KEY, EDMUNDS_SECRET, MARKETCHECK_API_KEY
#   FORTELLIS_*, TEKION_*, REYNOLDS_*, DEALERTRACK_* (dealer integration credentials)
#   PUBLIC_WEB_URL, PUBLIC_APPRAISAL_TENANT_ID, INTERNAL_PILOT_METRICS_KEY
#   NODE_ENV=production
# Do NOT set SKIP_VALUATION_ENV_CHECK in production.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vex
      POSTGRES_PASSWORD: vex
      POSTGRES_DB: vex
    ports:
      - "5432:5432"
    volumes:
      - vex_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vex -d vex"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://vex:vex@postgres:5432/vex
      DIRECT_DATABASE_URL: postgresql://vex:vex@postgres:5432/vex
      REDIS_URL: redis://redis:6379
      # Set secrets via `deploy/.env` (auto-loaded when you run compose from `deploy/`) or your orchestrator.
      JWT_SECRET: ${JWT_SECRET:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      EDMUNDS_API_KEY: ${EDMUNDS_API_KEY:-}
      EDMUNDS_SECRET: ${EDMUNDS_SECRET:-}
      MARKETCHECK_API_KEY: ${MARKETCHECK_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      STRIPE_PRICE_STARTER_YEARLY: ${STRIPE_PRICE_STARTER_YEARLY:-}
      STRIPE_PRICE_PRO_YEARLY: ${STRIPE_PRICE_PRO_YEARLY:-}
      STRIPE_PRICE_ENTERPRISE_YEARLY: ${STRIPE_PRICE_ENTERPRISE_YEARLY:-}
      FORTELLIS_CLIENT_ID: ${FORTELLIS_CLIENT_ID:-}
      FORTELLIS_CLIENT_SECRET: ${FORTELLIS_CLIENT_SECRET:-}
      FORTELLIS_SUBSCRIPTION_ID: ${FORTELLIS_SUBSCRIPTION_ID:-}
      FORTELLIS_TOKEN_URL: ${FORTELLIS_TOKEN_URL:-}
      FORTELLIS_API_BASE_URL: ${FORTELLIS_API_BASE_URL:-}
      FORTELLIS_WEBHOOK_SECRET: ${FORTELLIS_WEBHOOK_SECRET:-}
      FORTELLIS_SANDBOX: ${FORTELLIS_SANDBOX:-}
      TEKION_CLIENT_ID: ${TEKION_CLIENT_ID:-}
      TEKION_CLIENT_SECRET: ${TEKION_CLIENT_SECRET:-}
      TEKION_SUBSCRIPTION_ID: ${TEKION_SUBSCRIPTION_ID:-}
      TEKION_TOKEN_URL: ${TEKION_TOKEN_URL:-}
      TEKION_API_BASE_URL: ${TEKION_API_BASE_URL:-}
      TEKION_WEBHOOK_SECRET: ${TEKION_WEBHOOK_SECRET:-}
      TEKION_SANDBOX: ${TEKION_SANDBOX:-}
      REYNOLDS_CLIENT_ID: ${REYNOLDS_CLIENT_ID:-}
      REYNOLDS_CLIENT_SECRET: ${REYNOLDS_CLIENT_SECRET:-}
      REYNOLDS_SUBSCRIPTION_ID: ${REYNOLDS_SUBSCRIPTION_ID:-}
      REYNOLDS_TOKEN_URL: ${REYNOLDS_TOKEN_URL:-}
      REYNOLDS_API_BASE_URL: ${REYNOLDS_API_BASE_URL:-}
      REYNOLDS_WEBHOOK_SECRET: ${REYNOLDS_WEBHOOK_SECRET:-}
      REYNOLDS_SANDBOX: ${REYNOLDS_SANDBOX:-}
      DEALERTRACK_CLIENT_ID: ${DEALERTRACK_CLIENT_ID:-}
      DEALERTRACK_CLIENT_SECRET: ${DEALERTRACK_CLIENT_SECRET:-}
      DEALERTRACK_SUBSCRIPTION_ID: ${DEALERTRACK_SUBSCRIPTION_ID:-}
      DEALERTRACK_TOKEN_URL: ${DEALERTRACK_TOKEN_URL:-}
      DEALERTRACK_API_BASE_URL: ${DEALERTRACK_API_BASE_URL:-}
      DEALERTRACK_WEBHOOK_SECRET: ${DEALERTRACK_WEBHOOK_SECRET:-}
      DEALERTRACK_SANDBOX: ${DEALERTRACK_SANDBOX:-}
      CDK_SANDBOX: ${CDK_SANDBOX:-}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-}
      PUBLIC_APPRAISAL_TENANT_ID: ${PUBLIC_APPRAISAL_TENANT_ID:-}
      INTERNAL_PILOT_METRICS_KEY: ${INTERNAL_PILOT_METRICS_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  vex_pg:
