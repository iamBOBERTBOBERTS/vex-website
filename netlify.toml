# Netlify Configuration for VEX Public Website
# This file ensures reproducible builds regardless of UI settings

[build]
  # Build from workspace root but target only the web app
  base = "."
  publish = "apps/web/.next"
  command = "pnpm install --frozen-lockfile --prod=false && pnpm --filter @vex/shared run build && pnpm --filter @vex/cinematic run build && pnpm --filter @vex/3d-configurator run build && pnpm --filter @vex/ui run build && pnpm --filter @vex/web run build"

[build.environment]
  # Explicit versions for reproducibility
  NODE_VERSION = "20"
  NPM_FLAGS = "--version" # Prevents npm from running, we use pnpm
  NPM_CONFIG_PRODUCTION = "false"
  # pnpm version is controlled by packageManager field in package.json

# Next.js on Netlify requires specific handling
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "production" }
